<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <title>¿Allá Llueve?</title>

    <meta property="og:title" content="¿Allá Llueve?">
    <meta property="og:site_name" content="¿Allá Llueve?">
    <meta property="og:url" content="https://tinchoreta.github.io/LlueveAlla/">
    <meta property="og:description" content="Chequeá el clima en tu ciudad · Argentina">
    <meta property="og:type" content="website">

    <!-- Fuentes modernas -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">

    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <!-- Materialize (solo para el autocomplete JS) -->
    <link rel="stylesheet" href="./src/css/materialize.min.css">

    <link rel="stylesheet" href="./src/css/style.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">

    <script defer src="./src/js/weather.js"></script>
</head>
<body>

    <!-- Fondo animado -->
    <div class="bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="particles">
            <span></span><span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span><span></span>
        </div>
    </div>

    <div class="app">

        <header class="app-header">
            <h1 class="app-title">¿Allá Llueve?</h1>
            <p class="app-subtitle">Clima en tiempo real &middot; Argentina</p>
        </header>

        <div class="search-wrapper">
            <div class="search-box">
                <i class="material-icons search-icon">location_on</i>
                <input
                    type="text"
                    id="autocomplete-input"
                    class="autocomplete cities city-input"
                    placeholder="Ingresá una ciudad..."
                    autocomplete="off"
                >
            </div>
            <button id="searchWeather" class="search-btn">
                <i class="material-icons">search</i>
                <span>Buscar</span>
            </button>
        </div>

        <!-- Tarjeta de resultados -->
        <div class="weather-card results">

            <div class="card-shine"></div>

            <div class="city-row">
                <i class="material-icons city-pin">place</i>
                <h2 class="city"></h2>
            </div>

            <div class="weather-main">
                <div class="temp-block">
                    <div class="temp-display">
                        <span class="temp-number">--</span>
                        <span class="temp-unit">°C</span>
                    </div>
                    <p class="detalle"></p>
                </div>
                <div class="icon-block">
                    <div class="icon-ring"></div>
                    <img src="" class="img weather-icon" alt="Icono del clima">
                </div>
            </div>

            <div class="stats-row">
                <div class="stat">
                    <i class="material-icons stat-icon">water_drop</i>
                    <span class="humidity-value humidity">--</span>
                    <label class="stat-label">Humedad</label>
                </div>
                <div class="stat-divider"></div>
                <div class="stat">
                    <i class="material-icons stat-icon">air</i>
                    <span class="wind-value wind">--</span>
                    <label class="stat-label">Viento</label>
                </div>
                <div class="stat-divider"></div>
                <div class="stat">
                    <i class="material-icons stat-icon">thermostat</i>
                    <span class="feels-value">--</span>
                    <label class="stat-label">Térmica</label>
                </div>
            </div>

        </div>

    </div>

    <script src="./src/js/materialize.min.js"></script>
    <script src="./src/js/sweetalert2.all.min.js"></script>
</body>
</html>
